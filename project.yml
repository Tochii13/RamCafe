name: RamCafe
options:
  bundleIdPrefix: com.ramcafe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  RamCafe:
    type: application
    platform: iOS
    sources:
      - path: RamCafe
        excludes:
          - "*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ramcafe.app
        INFOPLIST_KEY_CFBundleDisplayName: Ram Café
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
